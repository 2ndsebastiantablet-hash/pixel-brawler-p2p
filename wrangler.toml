name = "pixel-brawler-p2p-signaling"
main = "worker/index.ts"
compatibility_date = "2026-07-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[durable_objects.bindings]]
name = "ROOM_DIRECTORY"
class_name = "RoomDirectoryDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject", "RoomDirectoryDurableObject"]
